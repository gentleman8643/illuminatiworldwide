<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Cinematic Portal</title>

<style>
/* ===== BASE ===== */
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: black;
  color: gold;
  overflow: hidden;
}

/* ===== LOADING SCREEN ===== */
#loader {
  position: fixed;
  width: 100%;
  height: 100%;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  z-index: 999;
}

.loader-text {
  font-size: 1.5rem;
  letter-spacing: 3px;
  animation: fade 2s infinite;
}

@keyframes fade {
  0%,100% {opacity: 0.2;}
  50% {opacity: 1;}
}

/* ===== BACKGROUND GLOW ===== */
.glow {
  position: fixed;
  width: 600px;
  height: 600px;
  background: gold;
  filter: blur(200px);
  opacity: 0.12;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  animation: float 6s infinite ease-in-out;
}

@keyframes float {
  0%,100% {transform: translate(-50%, -50%) translateY(0);}
  50% {transform: translate(-50%, -50%) translateY(-40px);}
}

/* ===== MAIN CONTENT ===== */
#content {
  display: none;
  height: 100vh;
  text-align: center;
  padding: 60px 20px;
}

h1 {
  font-size: 3rem;
  letter-spacing: 6px;
  margin-top: 60px;
}

p {
  max-width: 600px;
  margin: 20px auto;
  opacity: 0.8;
}

/* ===== BUTTONS ===== */
.btn {
  display: block;
  margin: 12px auto;
  padding: 12px 25px;
  border: 1px solid gold;
  color: gold;
  text-decoration: none;
  width: 220px;
  border-radius: 8px;
  transition: 0.3s;
}

.btn:hover {
  background: gold;
  color: black;
  transform: scale(1.05);
}

/* ===== FADE IN ===== */
.fade-in {
  animation: appear 2s ease forwards;
}

@keyframes appear {
  from {opacity: 0; transform: translateY(20px);}
  to {opacity: 1; transform: translateY(0);}
}
</style>
</head>

<body>

<!-- LOADING SCREEN -->
<div id="loader">
  <div class="loader-text">ENTERING PORTAL...</div>
</div>

<div class="glow"></div>

<!-- MAIN CONTENT -->
<div id="content">

  <h1 class="fade-in">CINEMATIC PORTAL</h1>

  <p class="fade-in">
    A symbolic digital experience of knowledge, mystery, and immersive design.
  </p>

  <!-- BUTTONS -->
  <a class="btn fade-in"
     href="https://wa.me/12139420224?text=Hello%20I%20want%20to%20join%20the%20Illuminati"
     target="_blank">
     Join Portal
  </a>

  <a class="btn fade-in"
     href="https://wa.me/12139420224?text=Hello%20I%20need%20more%20information"
     target="_blank">
     Contact Support
  </a>

  <a class="btn fade-in"
     href="https://wa.me/12139420224?text=Hello%20I%20want%20VIP%20access"
     target="_blank">
     VIP Access
  </a>

</div>

<!-- SCRIPT -->
<script>
setTimeout(() => {
  document.getElementById("loader").style.display = "none";
  document.getElementById("content").style.display = "block";
}, 2500);
</script>

</body>
</html>
